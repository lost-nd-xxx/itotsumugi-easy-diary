<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ひとこま</title>
<meta name="description" content="一日のかけらを、アイコンで綴る日記" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#1b1e22" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#edeeea" media="(prefers-color-scheme: light)" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
  /* ===== デザイントークン ===== */
  :root{
    --paper:#edeeea; --surface:#f7f8f5; --surface-2:#e7e9e3;
    --ink:#2a2d2a; --muted:#6b716a; --line:#d6d9d1;
    --accent:#5c7c6e; --accent-soft:#dce6df; --accent-ink:#3e5a4e;
    --danger:#9a5a5a; --shadow:0 1px 2px rgba(40,45,40,.06),0 6px 20px rgba(40,45,40,.06);
    --radius:16px; --radius-sm:11px;
    --serif:"Hiragino Mincho ProN","Yu Mincho","YuMincho","Noto Serif JP","Noto Serif CJK JP",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","YuGothic","Noto Sans JP","Noto Sans CJK JP",system-ui,sans-serif;
  }
  [data-theme="dark"]{
    --paper:#1b1e22; --surface:#242830; --surface-2:#2d323b;
    --ink:#e6e8e4; --muted:#9aa09a; --line:#363b43;
    --accent:#7fa890; --accent-soft:#2e3a33; --accent-ink:#a9cdb8;
    --danger:#c98a8a; --shadow:0 1px 2px rgba(0,0,0,.25),0 8px 24px rgba(0,0,0,.28);
  }
  /* ダーク時は日時入力のカレンダーアイコン・ネイティブピッカーを白系に揃える */
  [data-theme="dark"] input[type="datetime-local"],
  [data-theme="dark"] input[type="date"]{ color-scheme:dark; }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper); color:var(--ink); font-family:var(--sans);
    font-size:16px; line-height:1.6; -webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
  }
  .wrap{max-width:560px; margin:0 auto; padding:18px 18px calc(96px + env(safe-area-inset-bottom));}
  button{font-family:inherit; color:inherit; cursor:pointer}
  :focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:6px}

  /* ===== ヘッダ ===== */
  header{display:flex; align-items:center; justify-content:center; gap:12px; margin:10px 0 4px}
  .app-title{font-family:var(--serif); font-size:21px; letter-spacing:.06em; color:var(--ink)}
  .nav-btn{background:none; border:none; font-size:22px; color:var(--muted); width:38px; height:38px; border-radius:50%; display:grid; place-items:center}
  .nav-btn:hover{background:var(--surface-2); color:var(--ink)}

  /* ===== バックアップ催促 ===== */
  .reminder{display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--line);
    border-radius:var(--radius-sm); padding:11px 13px; margin:12px 0; font-size:13.5px; color:var(--muted)}
  .reminder strong{color:var(--ink); font-weight:600}
  .reminder .grow{flex:1}
  .reminder button{border:none; background:var(--accent); color:#fff; padding:7px 13px; border-radius:9px; font-size:13px; font-weight:600}
  [data-theme="dark"] .reminder button{color:#16201a}
  .reminder .x{background:none; color:var(--muted); padding:4px 8px; font-size:16px}
  /* ダーク時、閉じる✕は「書き出す」ボタン向けの濃色指定を打ち消して白系に */
  [data-theme="dark"] .reminder .x{color:var(--ink)}

  /* ===== 記録パレット ===== */
  .panel{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow); margin:14px 0}
  .palette{display:grid; grid-template-columns:repeat(auto-fill,minmax(64px,1fr)); gap:9px}
  .chip{background:var(--paper); border:1px solid var(--line); border-radius:var(--radius-sm); padding:10px 4px 7px;
    display:flex; flex-direction:column; align-items:center; gap:3px; transition:transform .12s ease, background .15s}
  .chip:active{transform:scale(.93)}
  .chip .emo{font-size:25px; line-height:1}
  .chip .lbl{font-size:11px; color:var(--muted); max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .chip.sel{background:var(--accent-soft); border-color:var(--accent)}
  .chip.sel .lbl{color:var(--accent-ink)}
  .chip .check{position:absolute; top:3px; right:4px; font-size:11px; color:var(--accent); opacity:0; transition:opacity .12s}
  .chip{position:relative}
  .chip.sel .check{opacity:1}

  /* ===== 詳細設定（折りたたみ） ===== */
  .details{margin:12px 0 4px; border:1px solid var(--line); border-radius:var(--radius-sm); background:var(--paper)}
  .details > summary{list-style:none; cursor:pointer; padding:11px 13px; font-size:13.5px; color:var(--muted); display:flex; align-items:center; gap:7px}
  .details > summary::-webkit-details-marker{display:none}
  .details > summary::before{content:"＋"; font-size:14px; color:var(--accent); width:14px; text-align:center}
  .details[open] > summary::before{content:"−"}
  .details[open] > summary{color:var(--ink); border-bottom:1px solid var(--line)}
  .details-body{padding:13px}

  /* ===== 記録ボタン ===== */
  .commit-btn{margin-top:12px; display:flex; align-items:center; justify-content:center; gap:8px}
  .commit-btn:disabled{background:var(--surface-2); color:var(--muted); cursor:default}
  .commit-count{background:rgba(255,255,255,.28); border-radius:999px; min-width:21px; padding:1px 7px; font-size:13px; font-variant-numeric:tabular-nums}
  .commit-count[hidden]{display:none}

  /* ===== きょうの糸（タイムライン） ===== */
  .thread-head{display:flex; align-items:baseline; gap:8px; margin:22px 4px 6px}
  .thread-head h2{font-family:var(--serif); font-size:16px; font-weight:500; margin:0}
  .thread-head .count{font-size:12.5px; color:var(--muted)}
  /* その日ビューのヘッダ（戻る‹ ＋ 見出し） */
  #dayView .thread-head{align-items:center}
  #dayView .nav-btn{margin-left:-8px}

  /* ===== 紡いだ糸フィード ===== */
  .date-divider{display:flex; align-items:center; gap:10px; margin:18px 4px 4px; color:var(--muted); font-size:12.5px}
  .date-divider::before,.date-divider::after{content:""; flex:1; height:1px; background:var(--line)}
  .date-divider span{font-family:var(--serif); letter-spacing:.02em}
  .more-btn{margin:14px 0 4px; width:100%}
  .more-btn[hidden]{display:none}
  .thread{margin-left:6px; position:relative; padding-left:22px}
  .thread::before{content:""; position:absolute; left:5px; top:0; bottom:0; width:2px; background:var(--line)}
  .node{display:flex; gap:10px; align-items:center; padding:5px 0; position:relative; min-width:0}
  .node-dot{width:12px; height:12px; border-radius:50%; background:var(--surface); border:2.5px solid var(--accent);
    flex-shrink:0; margin-left:-22px; z-index:1; position:relative}
  .node-card{display:flex; gap:11px; align-items:flex-start; background:var(--surface); border:1px solid var(--line);
    border-radius:var(--radius-sm); padding:10px 12px; box-shadow:var(--shadow); width:100%; min-width:0; text-align:left}
  .node-card:hover{border-color:var(--accent)}
  .node-emos{display:flex; flex-wrap:wrap; gap:3px; align-items:flex-start}
  .node-emo{font-size:23px; line-height:1.2}
  .node-emo-more{font-size:12px; color:var(--muted); align-self:flex-end; padding-bottom:3px}
  .node-body{flex:1; min-width:0}
  .node-top{display:flex; align-items:baseline; gap:8px}
  .node-label{font-weight:600; font-size:14.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .node-time{font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; white-space:nowrap}
  .node-note{font-size:14px; color:var(--ink); margin-top:2px; white-space:pre-wrap; word-break:break-word}
  /* 拡張カード（複数アイコン or メモあり） */
  .node-card.expanded{flex-direction:column; gap:4px; min-width:0; width:0; flex:1}
  .node-card.expanded .node-emos{flex-wrap:nowrap}
  .node-card.expanded .node-header{display:flex; align-items:center; gap:8px; width:100%}
  .node-card.expanded .node-label{font-size:14.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; width:100%}
  .node-card.expanded .node-note{margin-top:0; font-size:14px}
  .empty{text-align:center; color:var(--muted); padding:34px 16px; font-size:14px}
  .empty .e{font-size:30px; display:block; margin-bottom:8px; opacity:.7}

  /* ===== 下部バー ===== */
  .tabbar{position:fixed; left:0; right:0; bottom:0; z-index:20; background:color-mix(in srgb,var(--paper) 88%,transparent);
    backdrop-filter:saturate(1.4) blur(10px); border-top:1px solid var(--line);
    padding:8px 12px calc(8px + env(safe-area-inset-bottom)); display:flex; gap:8px; justify-content:center}
  .tabbar button{flex:1; max-width:170px; background:none; border:none; color:var(--muted); font-size:12px;
    display:flex; flex-direction:column; align-items:center; gap:3px; padding:5px}
  .tabbar button .ic{font-size:19px}
  .tabbar button:hover{color:var(--ink)}

  /* ===== モーダル ===== */
  .scrim{position:fixed; inset:0; background:rgba(20,22,20,.42); display:none; align-items:flex-end; justify-content:center; z-index:30}
  .scrim.open{display:flex}
  .sheet{background:var(--paper); width:100%; max-width:560px; box-sizing:border-box; border-radius:20px 20px 0 0; padding:20px 20px calc(24px + env(safe-area-inset-bottom));
    max-height:88vh; overflow:auto; box-shadow:0 -8px 40px rgba(0,0,0,.18); animation:rise .22s ease}
  @keyframes rise{from{transform:translateY(20px); opacity:.6}to{transform:none; opacity:1}}
  .sheet h3{font-family:var(--serif); font-size:19px; margin:2px 0 16px}
  .field{margin-bottom:15px}
  .field label{display:block; font-size:13px; color:var(--muted); margin-bottom:6px}
  .field input,.field textarea,.field select{width:100%; background:var(--surface); border:1px solid var(--line);
    border-radius:11px; padding:11px 12px; font-size:15px; color:var(--ink); font-family:inherit}
  .field textarea{min-height:74px; resize:vertical}
  .row{display:flex; gap:10px}
  .row > *{flex:1}
  .btn{border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:600; width:100%}
  .btn-primary{background:var(--accent); color:#fff}
  [data-theme="dark"] .btn-primary{color:#16201a}
  .btn-ghost{background:var(--surface-2); color:var(--ink)}
  .btn-danger{background:none; color:var(--danger); border:1px solid var(--danger)}
  #confirmScrim{z-index:35}
  .confirm-sheet{max-height:unset; padding:24px 20px 20px}
  .confirm-msg{font-size:15px; margin:0 0 20px; text-align:center; line-height:1.6}
  .actions{display:flex; gap:10px; margin-top:6px}

  /* 設定: パレット編集 */
  .seg{display:flex; background:var(--surface-2); border-radius:11px; padding:3px}
  .seg button{flex:1; border:none; background:none; padding:9px; border-radius:8px; font-size:13.5px; color:var(--muted)}
  .seg button.on{background:var(--surface); color:var(--ink); font-weight:600; box-shadow:var(--shadow)}
  .pal-edit{display:flex; flex-direction:column; gap:8px; margin:4px 0 10px}
  .pal-item{display:flex; gap:8px; align-items:center; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:7px 9px}
  .pal-item input.emo{width:48px; text-align:center; font-size:20px; padding:8px 0}
  .pal-item input.lbl{flex:1}
  .pal-item input{background:var(--paper); border:1px solid var(--line); border-radius:9px; padding:8px; color:var(--ink); font-size:14px; font-family:inherit}
  .pal-item .mv{background:none; border:none; color:var(--muted); font-size:16px; width:28px; height:30px; border-radius:7px}
  .pal-item .mv:hover{background:var(--surface-2); color:var(--ink)}
  .pal-item .del{background:none; border:none; color:var(--danger); font-size:17px; width:30px; height:30px; border-radius:7px}
  .add-pal{background:var(--accent-soft); color:var(--accent-ink); border:none; border-radius:10px; padding:10px; font-size:13.5px; font-weight:600; width:100%}
  .hint{font-size:12.5px; color:var(--muted); margin:6px 2px 0; line-height:1.5}
  .sec{margin-top:20px; padding-top:18px; border-top:1px solid var(--line)}
  .sec h4{font-size:13px; color:var(--muted); font-weight:600; margin:0 0 11px; letter-spacing:.04em}
  .pick-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(56px,1fr)); gap:8px; margin-bottom:8px}
  .pick{background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:9px 2px; display:flex; flex-direction:column; gap:2px; align-items:center}
  .pick.sel{border-color:var(--accent); background:var(--accent-soft)}
  .pick .emo{font-size:22px} .pick .lbl{font-size:10px; color:var(--muted)}

  /* ===== カレンダー ===== */
  .cal-header{display:flex; align-items:center; justify-content:space-between; margin:18px 4px 10px}
  .cal-month{font-family:var(--serif); font-size:18px; letter-spacing:.02em}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:0;
    border-left:1px solid var(--line); border-top:1px solid var(--line)}
  .cal-dow{text-align:center; font-size:11px; color:var(--muted); padding:5px 0;
    font-weight:600; border-right:1px solid var(--line); border-bottom:1px solid var(--line); background:var(--surface)}
  .cal-dow.sun{color:var(--danger)}
  .cal-dow.sat{color:var(--accent)}
  .cal-cell{border-right:1px solid var(--line); border-bottom:1px solid var(--line);
    padding:2px; cursor:pointer; position:relative}
  .cal-cell.other-month{opacity:.35}
  .cal-cell.filtered-out .cal-inner{opacity:.3}
  /* ハイライトはインナーに閉じて角丸と罫線を共存させる */
  .cal-inner{min-height:48px; border-radius:var(--radius-sm); padding:4px 3px 3px;
    display:flex; flex-direction:column; align-items:center; gap:2px; transition:background .12s}
  .cal-cell:hover .cal-inner{background:var(--surface-2)}
  .cal-cell.today .cal-inner{background:var(--accent-soft)}
  .cal-cell.today .cal-day{color:var(--accent); font-weight:700}
  .cal-day{font-size:12px; font-variant-numeric:tabular-nums; line-height:1; color:var(--ink)}
  .cal-day.sun{color:var(--danger)}
  .cal-day.sat{color:var(--accent)}
  .cal-icons{display:flex; flex-wrap:wrap; justify-content:center; gap:1px; margin-top:1px}
  .cal-ic{font-size:13px; line-height:1}

  /* ===== 絞り込みシート ===== */
  .filter-genre-row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px}
  .filter-genre{background:var(--surface-2); border:1px solid var(--line); border-radius:999px;
    padding:7px 15px; font-size:13.5px; color:var(--muted); cursor:pointer}
  .filter-genre.sel{background:var(--accent-soft); border-color:var(--accent); color:var(--accent-ink); font-weight:600}
  .filter-icon-grid{display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-bottom:8px}
  .filter-icon{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-sm);
    padding:8px 2px; display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer}
  .filter-icon.sel{background:var(--accent-soft); border-color:var(--accent)}
  .filter-icon .emo{font-size:20px}
  .filter-icon .lbl{font-size:10px; color:var(--muted); text-align:center}
  .filter-icon.sel .lbl{color:var(--accent-ink)}
  .filter-sec{margin-bottom:4px; font-size:12px; color:var(--muted); font-weight:600; letter-spacing:.04em}
  /* 絞り込み中バッジ（フィード/カレンダー見出し） */
  .filter-badge{display:inline-flex; align-items:center; gap:5px; background:var(--accent-soft);
    color:var(--accent-ink); border-radius:999px; padding:3px 10px; font-size:12px; font-weight:600; margin-left:8px; cursor:pointer}

  /* トースト */
  .toast{position:fixed; left:50%; bottom:calc(86px + env(safe-area-inset-bottom)); transform:translateX(-50%) translateY(10px);
    background:var(--ink); color:var(--paper); padding:10px 16px; border-radius:999px; font-size:13.5px; font-weight:600;
    opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; z-index:40; box-shadow:var(--shadow)}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="app-title">ひとこま</div>
  </header>

  <div id="reminderSlot"></div>

  <section class="panel" aria-label="記録する">
    <div class="palette" id="palette"></div>

    <details class="details" id="detailsBox">
      <summary>詳細設定（日時・メモ）</summary>
      <div class="details-body">
        <div class="field">
          <label for="detailTime">日時</label>
          <input id="detailTime" type="datetime-local" />
        </div>
        <div class="field" style="margin-bottom:0">
          <label for="detailNote">メモ</label>
          <textarea id="detailNote" placeholder="（任意）"></textarea>
        </div>
      </div>
    </details>

    <button class="btn btn-primary commit-btn" id="commitBtn" disabled>
      記録<span class="commit-count" id="commitCount" hidden></span>
    </button>
  </section>

  <!-- ホーム：紡いだ糸（全日付横断フィード） -->
  <section id="feedView">
    <div class="thread-head">
      <h2>紡いだ糸</h2>
      <span class="count" id="feedCount"></span>
    </div>
    <div id="feedSlot"></div>
    <button class="btn btn-ghost more-btn" id="moreBtn" hidden>もっと見る</button>
  </section>

  <!-- その日ビュー（カレンダーで日をタップしたとき。既定は非表示） -->
  <section id="dayView" hidden>
    <div class="thread-head">
      <button class="nav-btn" id="dayBack" aria-label="ホームへ戻る">‹</button>
      <h2 id="dayTitle">きょうの糸</h2>
      <span class="count" id="threadCount"></span>
    </div>
    <div id="threadSlot"></div>
  </section>

  <!-- カレンダービュー（既定は非表示） -->
  <section id="calView" hidden>
    <div class="cal-header">
      <button class="nav-btn" id="calPrev" aria-label="前の月">‹</button>
      <span class="cal-month" id="calMonth"></span>
      <button class="nav-btn" id="calNext" aria-label="次の月">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </section>
</div>

<nav class="tabbar">
  <button id="tabCal"><span class="ic">📅</span>カレンダー</button>
  <button id="tabToday"><span class="ic">🧵</span>ホーム</button>
  <button id="tabFilter"><span class="ic">🔍</span>絞り込み<span id="filterBadge" hidden style="font-size:10px;vertical-align:super;color:var(--accent)">●</span></button>
  <button id="tabSettings"><span class="ic">⚙</span>設定</button>
</nav>

<!-- 記録の編集シート -->
<div class="scrim" id="editScrim">
  <div class="sheet" role="dialog" aria-modal="true" aria-label="記録を編集">
    <h3>記録を編集</h3>
    <div class="field">
      <label>アイコン</label>
      <div class="pick-grid" id="editPicks"></div>
    </div>
    <div class="field"><label>時刻</label><input id="editTime" type="datetime-local" /></div>
    <div class="field"><label>メモ</label><textarea id="editNote" placeholder="（任意）"></textarea></div>
    <div class="actions">
      <button class="btn btn-primary" id="editSave">保存</button>
      <button class="btn btn-ghost" id="editClose">閉じる</button>
    </div>
    <div class="actions"><button class="btn btn-danger" id="editDelete">この記録を削除</button></div>
  </div>
</div>

<!-- 絞り込みシート -->
<div class="scrim" id="filterScrim">
  <div class="sheet" role="dialog" aria-modal="true" aria-label="絞り込み">
    <h3>絞り込み</h3>
    <div id="filterBody"></div>
    <div class="actions" style="margin-top:16px">
      <button class="btn btn-ghost" id="filterClear">クリア</button>
      <button class="btn btn-primary" id="filterApply">適用</button>
    </div>
  </div>
</div>

<!-- 確認ダイアログ -->
<div class="scrim" id="confirmScrim">
  <div class="sheet confirm-sheet" role="dialog" aria-modal="true">
    <p id="confirmMsg" class="confirm-msg"></p>
    <div class="actions">
      <button class="btn btn-ghost" id="confirmCancel">キャンセル</button>
      <button class="btn btn-danger" id="confirmOk">削除</button>
    </div>
  </div>
</div>

<!-- 設定シート -->
<div class="scrim" id="setScrim">
  <div class="sheet" role="dialog" aria-modal="true" aria-label="設定">
    <h3>設定</h3>

    <div class="field">
      <label>テーマ</label>
      <div class="seg" id="themeSeg">
        <button data-t="auto">自動</button><button data-t="light">ライト</button><button data-t="dark">ダーク</button>
      </div>
    </div>

    <div class="field">
      <label>記録パレット</label>
      <div class="pal-edit" id="palEdit"></div>
      <button class="add-pal" id="addPal">＋ アイコンを追加</button>
      <p class="hint">左の枠に絵文字、右にラベル。↑↓で並べ替え。あなた専用の記録項目に作り替えてください。</p>
    </div>

    <div class="sec">
      <h4>データ</h4>
      <div class="row">
        <button class="btn btn-ghost" id="exportBtn">書き出し（JSON）</button>
        <button class="btn btn-ghost" id="importBtn">読み込み</button>
      </div>
      <input id="importFile" type="file" accept="application/json,.json" hidden />
      <div class="field" style="margin-top:13px">
        <label>バックアップを促す間隔</label>
        <select id="reminderDays">
          <option value="0">促さない</option><option value="3">3日ごと</option>
          <option value="7">7日ごと</option><option value="14">14日ごと</option><option value="30">30日ごと</option>
        </select>
      </div>
      <button class="btn btn-ghost" id="persistBtn" style="margin-top:4px">端末に永続化を依頼</button>
      <p class="hint" id="persistState"></p>
    </div>

    <div class="sec">
      <h4>このアプリについて</h4>
      <p class="hint">「ひとこま」— 一日のかけらを綴る記録帳。データはこの端末の中だけに保存されます（外部送信なし）。機種変更や消去に備えて、ときどき書き出しでバックアップを。</p>
    </div>

    <div class="actions" style="margin-top:16px"><button class="btn btn-primary" id="setClose">閉じる</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
/* =========================================================
   ひとこま — ローカル日記 PWA
   保存層は Store として抽象化（将来 Drive 等に差し替え可能）
   ========================================================= */

// ---------- IndexedDB ラッパ ----------
const DB_NAME="hitokoma", DB_VER=1;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=()=>{
      const db=r.result;
      if(!db.objectStoreNames.contains("entries")){
        const s=db.createObjectStore("entries",{keyPath:"id"});
        s.createIndex("by_ts","ts");
      }
      if(!db.objectStoreNames.contains("meta")) db.createObjectStore("meta",{keyPath:"k"});
    };
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
function tx(db,store,mode){return db.transaction(store,mode).objectStore(store);}
function reqP(req){return new Promise((res,rej)=>{req.onsuccess=()=>res(req.result);req.onerror=()=>rej(req.error);});}

// ---------- Store（差し替え可能な保存層） ----------
const Store={
  db:null,
  async init(){ this.db=await openDB(); },
  async addEntry(e){ await reqP(tx(this.db,"entries","readwrite").add(e)); return e; },
  async putEntry(e){ await reqP(tx(this.db,"entries","readwrite").put(e)); return e; },
  async deleteEntry(id){ await reqP(tx(this.db,"entries","readwrite").delete(id)); },
  async entriesInRange(startMs,endMs){
    const idx=tx(this.db,"entries","readonly").index("by_ts");
    return await reqP(idx.getAll(IDBKeyRange.bound(startMs,endMs,false,true)));
  },
  async allEntries(){ return await reqP(tx(this.db,"entries","readonly").getAll()); },
  async clearEntries(){ await reqP(tx(this.db,"entries","readwrite").clear()); },
  async getMeta(k,fb){ const r=await reqP(tx(this.db,"meta","readonly").get(k)); return r? r.v : fb; },
  async setMeta(k,v){ await reqP(tx(this.db,"meta","readwrite").put({k,v})); },
};

// ---------- スキーマ版 ----------
// データ形式を破壊的に変えたら上げる。起動時に meta.schema と突き合わせて
// 冪等にマイグレーションする（現状は v2 が初期形式。過去形式の変換ロジックは持たない）。
const SCHEMA=2;

// ---------- 既定ジャンル（データ駆動：固定ハードコードしない） ----------
// 増減 UI は v2 スコープ外。今は3ジャンル固定運用だが、配列を起点に動的描画する。
const DEFAULT_GENRES=[
  {key:"mood",  label:"気分"},
  {key:"health",label:"体調"},
  {key:"life",  label:"生活"},
];

// ---------- 既定パレット（v2：各ジャンル6個 / 5-9） ----------
const DEFAULT_PALETTE=[
  // 気分(mood)
  {emo:"😄",lbl:"楽しい",  genre:"mood"},{emo:"🙂",lbl:"穏やか",  genre:"mood"},
  {emo:"😐",lbl:"普通",    genre:"mood"},{emo:"😴",lbl:"眠い",    genre:"mood"},
  {emo:"😟",lbl:"ややつらい",genre:"mood"},{emo:"😣",lbl:"つらい",  genre:"mood"},
  // 体調(health)
  {emo:"🤕",lbl:"頭痛",    genre:"health"},{emo:"😖",lbl:"腹痛",    genre:"health"},
  {emo:"🩸",lbl:"生理",    genre:"health"},{emo:"💊",lbl:"服薬",    genre:"health"},
  {emo:"😮‍💨",lbl:"疲労",  genre:"health"},{emo:"😪",lbl:"眠気",    genre:"health"},
  // 生活(life)
  {emo:"✍️",lbl:"制作",    genre:"life"},{emo:"🎮",lbl:"遊び",    genre:"life"},
  {emo:"☕",lbl:"休息",    genre:"life"},{emo:"🚶",lbl:"お出かけ",genre:"life"},
  {emo:"🏃",lbl:"運動",    genre:"life"},{emo:"🛒",lbl:"買い物",  genre:"life"},
].map(p=>({id:uid(),...p}));

// ---------- 状態 ----------
const S={ viewDate:new Date(), palette:[], genres:[], theme:"auto", reminderDays:7, lastBackup:null, dismissReminder:false, weekStart:0, calDate:new Date() };
let editingId=null;
const editSelected=new Set(); // 編集シートで選択中のパレット item.id
// 記録の選択状態（パレット項目 id の集合）。記録ボタン押下で1件に確定する。
const selected=new Set();
// 画面モード："feed"=紡いだ糸（全日横断ホーム） / "day"=その日ビュー / "cal"=カレンダー
let viewMode="feed";
// フィードのページング（初期10件、もっと見るで +10）
const FEED_PAGE=10;
let feedLimit=FEED_PAGE;
// 絞り込み状態（両方空 = 絞り込みなし）
const filter={ genres:new Set(), icons:new Set() };
function filterActive(){ return filter.genres.size>0||filter.icons.size>0; }
// 1件の entry が絞り込み条件に一致するか（OR判定）
function entryMatches(e){
  if(!filterActive()) return true;
  return (e.icons||[]).some(ic=>
    (filter.genres.size>0&&filter.genres.has(ic.genre))||
    (filter.icons.size>0&&filter.icons.has(ic.emo))
  );
}

// ---------- 日付ユーティリティ ----------
const pad=n=>String(n).padStart(2,"0");
const WD=["日","月","火","水","木","金","土"];
function dayStart(d){const x=new Date(d);x.setHours(0,0,0,0);return x.getTime();}
function dayEnd(d){return dayStart(d)+86400000;}
function isSameDay(a,b){return dayStart(a)===dayStart(b);}
function fmtDateBig(d){return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;}
// フィードの日付ディバイダ用（曜日つき）。今日/昨日は前置きで分かりやすく。
function fmtDateDivider(ms){
  const d=new Date(ms), now=new Date();
  let pre="";
  if(isSameDay(d,now)) pre="今日 · ";
  else if(isSameDay(d,new Date(dayStart(now)-86400000))) pre="昨日 · ";
  return `${pre}${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${WD[d.getDay()]}）`;
}
function fmtTime(ms){const d=new Date(ms);return `${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function localInputValue(ms){const d=new Date(ms);return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

// ---------- テーマ ----------
function applyTheme(){
  let t=S.theme;
  if(t==="auto") t=matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";
  document.documentElement.setAttribute("data-theme",t);
}
matchMedia("(prefers-color-scheme: dark)").addEventListener("change",()=>{ if(S.theme==="auto") applyTheme(); });

// ---------- トースト ----------
let toastT=null;
function toast(msg){
  const el=document.getElementById("toast"); el.textContent=msg; el.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("show"),1700);
}

// ---------- レンダリング ----------
function renderHeader(){
  // 5-3以降ヘッダは固定タイトルのみ。その日ビューの日付は showDay() が dayTitle に書く。
}
function renderPalette(){
  const p=document.getElementById("palette"); p.innerHTML="";
  S.palette.forEach((it)=>{
    const on=selected.has(it.id);
    const b=document.createElement("button");
    b.className="chip"+(on?" sel":"");
    b.setAttribute("aria-pressed",on?"true":"false");
    b.setAttribute("aria-label",`選択：${it.lbl}`);
    b.innerHTML=`<span class="check">✓</span><span class="emo">${it.emo}</span><span class="lbl">${it.lbl}</span>`;
    b.addEventListener("click",()=>toggleSelect(it,b));
    p.appendChild(b);
  });
}
// パレット項目の選択/解除をトグル（複数・ジャンルまたぎ可）
function toggleSelect(it,btnEl){
  if(selected.has(it.id)) selected.delete(it.id); else selected.add(it.id);
  const on=selected.has(it.id);
  btnEl.classList.toggle("sel",on);
  btnEl.setAttribute("aria-pressed",on?"true":"false");
  updateCommitBtn();
}
// 記録ボタンの活性/件数表示を更新
function updateCommitBtn(){
  const btn=document.getElementById("commitBtn");
  const cnt=document.getElementById("commitCount");
  const n=selected.size;
  btn.disabled=n===0;
  if(n>1){ cnt.hidden=false; cnt.textContent=String(n); } else { cnt.hidden=true; }
}

// 1件分のカードノード（糸の点）。フィード・その日ビュー共通。
function makeEntryNode(e){
  const node=document.createElement("div"); node.className="node";
  const dot=document.createElement("div"); dot.className="node-dot";
  const card=document.createElement("button"); card.className="node-card";
  const icons=e.icons||[];
  const MAX_EMO=4;
  const shownIcons=icons.slice(0,MAX_EMO);
  const extra=icons.length-MAX_EMO;
  const emos=shownIcons.map(ic=>`<span class="node-emo">${ic.emo}</span>`).join("")
    +(extra>0?`<span class="node-emo-more">+${extra}</span>`:"");
  const label=icons.map(ic=>ic.lbl).filter(Boolean).join("・");
  const expanded=icons.length>1||!!e.note;
  if(expanded){
    card.classList.add("expanded");
    card.innerHTML=`
      <div class="node-header">
        <span class="node-emos">${emos}</span>
        <span class="node-time">${fmtTime(e.ts)}</span>
      </div>
      ${label?`<div class="node-label">${escapeHtml(label)}</div>`:""}
      ${e.note?`<span class="node-note">${escapeHtml(e.note)}</span>`:""}`;
  } else {
    card.innerHTML=`<span class="node-emos">${emos}</span>
      <span class="node-body">
        <span class="node-top"><span class="node-label">${escapeHtml(label)}</span><span class="node-time">${fmtTime(e.ts)}</span></span>
      </span>`;
  }
  card.addEventListener("click",()=>openEditor(e));
  node.appendChild(dot);
  node.appendChild(card);
  return node;
}

// ホーム：紡いだ糸（全日付横断・新しい順・初期10件＋もっと見る）
async function renderFeed(){
  const slot=document.getElementById("feedSlot");
  let all=await Store.allEntries();
  all.sort((a,b)=>b.ts-a.ts); // 新しい順
  // 絞り込みフィルタ適用
  const list=filterActive()?all.filter(entryMatches):all;
  const total=list.length;
  const countEl=document.getElementById("feedCount");
  countEl.textContent=total?`${total}件の記録`:"";
  if(!total){
    const msg=filterActive()?"絞り込み条件に一致する記録がありません。":"まだ記録がありません。<br>上のアイコンを選んで「記録」を押すと、ここに連なります。";
    slot.innerHTML=`<div class="empty"><span class="e">𓂃</span>${msg}</div>`;
    document.getElementById("moreBtn").hidden=true;
    return;
  }
  const shown=list.slice(0,feedLimit);
  const thread=document.createElement("div"); thread.className="thread";
  let lastDay=null;
  shown.forEach(e=>{
    const dayKey=dayStart(e.ts);
    if(dayKey!==lastDay){
      const div=document.createElement("div"); div.className="date-divider";
      div.innerHTML=`<span>${escapeHtml(fmtDateDivider(e.ts))}</span>`;
      thread.appendChild(div);
      lastDay=dayKey;
    }
    thread.appendChild(makeEntryNode(e));
  });
  slot.innerHTML=""; slot.appendChild(thread);
  document.getElementById("moreBtn").hidden = feedLimit>=total;
}

// その日ビュー（カレンダーで日タップ時。追記・編集の場）
async function renderThread(){
  const slot=document.getElementById("threadSlot");
  const start=dayStart(S.viewDate), end=dayEnd(S.viewDate);
  let list=await Store.entriesInRange(start,end);
  list.sort((a,b)=>a.ts-b.ts);
  document.getElementById("threadCount").textContent=list.length?`${list.length}件の記録`:"";
  if(!list.length){
    slot.innerHTML=`<div class="empty"><span class="e">𓂃</span>この日の記録はまだありません。<br>上のアイコンを選んで「記録」を押すと、この日に残ります。</div>`;
    return;
  }
  const thread=document.createElement("div"); thread.className="thread";
  list.forEach(e=>thread.appendChild(makeEntryNode(e)));
  slot.innerHTML=""; slot.appendChild(thread);
}
function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

// ---------- 記録（選択 → 確定） ----------
// 詳細設定の日時既定。カレンダー等から「その日に追加」する場合に正午でセットする受け口。
function defaultLogTs(){
  if(isSameDay(S.viewDate,new Date())) return Date.now();
  const d=new Date(S.viewDate); d.setHours(12,0,0,0); return d.getTime();
}
// 詳細設定をリセット（日時=既定、メモ空、折りたたみは閉じる）
function resetDetails(){
  document.getElementById("detailTime").value=localInputValue(defaultLogTs());
  document.getElementById("detailNote").value="";
  document.getElementById("detailsBox").open=false;
}
async function commitEntry(){
  if(selected.size===0) return;
  // 選択順を保つため palette の並び順で拾う。{emo,lbl,genre} をスナップショット格納。
  const icons=S.palette.filter(p=>selected.has(p.id))
    .map(p=>({emo:p.emo,lbl:p.lbl,genre:p.genre??null}));
  const tval=document.getElementById("detailTime").value;
  const ts=tval?new Date(tval).getTime():defaultLogTs();
  const note=document.getElementById("detailNote").value.trim();
  await Store.addEntry({id:uid(),ts,icons,note});
  // 選択と詳細設定をクリア
  selected.clear();
  renderPalette(); updateCommitBtn(); resetDetails();
  // 新規記録は先頭に来る。フィードは先頭を見せたいので表示数を初期に戻す。
  feedLimit=FEED_PAGE;
  toast(`記録しました · ${fmtTime(ts)}`);
  await refreshViews();
}

// 表示中のビューを最新化
async function refreshViews(){
  await renderFeed();
  if(viewMode==="day") await renderThread();
  if(viewMode==="cal") await renderCal();
}

// ---------- 編集シート ----------
function openEditor(e){
  editingId=e.id;
  editSelected.clear();
  // 記録済みアイコンのうちパレットに存在するものを選択状態に復元
  const existingEmos=new Set((e.icons||[]).map(ic=>ic.emo));
  S.palette.forEach(it=>{ if(existingEmos.has(it.emo)) editSelected.add(it.id); });
  document.getElementById("editTime").value=localInputValue(e.ts);
  document.getElementById("editNote").value=e.note||"";
  renderEditPicks();
  openScrim("editScrim");
}
function renderEditPicks(){
  const g=document.getElementById("editPicks"); g.innerHTML="";
  S.palette.forEach(it=>{
    const on=editSelected.has(it.id);
    const b=document.createElement("button");
    b.className="pick"+(on?" sel":"");
    b.setAttribute("aria-pressed", on?"true":"false");
    b.innerHTML=`<span class="check">✓</span><span class="emo">${it.emo}</span><span class="lbl">${it.lbl}</span>`;
    b.addEventListener("click",()=>{
      if(editSelected.has(it.id)) editSelected.delete(it.id); else editSelected.add(it.id);
      b.classList.toggle("sel", editSelected.has(it.id));
      b.setAttribute("aria-pressed", editSelected.has(it.id)?"true":"false");
    });
    g.appendChild(b);
  });
}
async function saveEdit(){
  const icons=S.palette
    .filter(it=>editSelected.has(it.id))
    .map(it=>({emo:it.emo, lbl:it.lbl, genre:it.genre??null}));
  if(!icons.length){ toast("アイコンを1つ以上選んでください"); return; }
  const tval=document.getElementById("editTime").value;
  const note=document.getElementById("editNote").value.trim();
  const ts=tval?new Date(tval).getTime():Date.now();
  await Store.putEntry({id:editingId,ts,icons,note});
  closeScrim("editScrim"); toast("更新しました");
  await refreshViews();
}
function matchLabel(emo){const f=S.palette.find(p=>p.emo===emo);return f?f.lbl:"記録";}
function matchGenre(emo){const f=S.palette.find(p=>p.emo===emo);return f?(f.genre??null):null;}
async function deleteEdit(){
  if(!await showConfirm("この記録を削除しますか？")) return;
  await Store.deleteEntry(editingId); closeScrim("editScrim"); toast("削除しました"); await refreshViews();
}

// ---------- 設定: パレット編集 ----------
function renderPalEdit(){
  const box=document.getElementById("palEdit"); box.innerHTML="";
  S.palette.forEach((it,i)=>{
    const row=document.createElement("div"); row.className="pal-item";
    row.innerHTML=`<input class="emo" value="${it.emo}" maxlength="8" aria-label="絵文字"/>
      <input class="lbl" value="${escapeAttr(it.lbl)}" aria-label="ラベル"/>
      <button class="mv up" aria-label="上へ">↑</button>
      <button class="mv dn" aria-label="下へ">↓</button>
      <button class="del" aria-label="削除">✕</button>`;
    const [emo,lbl]=row.querySelectorAll("input");
    emo.addEventListener("input",()=>{S.palette[i].emo=emo.value;});
    lbl.addEventListener("input",()=>{S.palette[i].lbl=lbl.value;});
    row.querySelector(".up").addEventListener("click",()=>movePal(i,-1));
    row.querySelector(".dn").addEventListener("click",()=>movePal(i,1));
    row.querySelector(".del").addEventListener("click",()=>{S.palette.splice(i,1); savePalette();});
    box.appendChild(row);
  });
}
function escapeAttr(s){return (s||"").replace(/"/g,"&quot;");}
function movePal(i,dir){
  const j=i+dir; if(j<0||j>=S.palette.length) return;
  [S.palette[i],S.palette[j]]=[S.palette[j],S.palette[i]]; savePalette();
}
async function savePalette(){
  S.palette=S.palette.filter(p=>(p.emo&&p.emo.trim()));
  await Store.setMeta("palette",S.palette);
  renderPalEdit(); renderPalette();
}

// ---------- バックアップ催促 ----------
function renderReminder(){
  const slot=document.getElementById("reminderSlot"); slot.innerHTML="";
  if(S.dismissReminder||!S.reminderDays) return;
  const due = !S.lastBackup || (Date.now()-S.lastBackup) > S.reminderDays*86400000;
  if(!due) return;
  const days = S.lastBackup? Math.floor((Date.now()-S.lastBackup)/86400000) : null;
  const el=document.createElement("div"); el.className="reminder";
  el.innerHTML=`<span class="grow"><strong>バックアップはお早めに。</strong> ${days!==null?`前回から${days}日`:"まだ一度も書き出していません"}。</span>
    <button id="remExport">書き出す</button><button class="x" id="remX" aria-label="閉じる">✕</button>`;
  slot.appendChild(el);
  el.querySelector("#remExport").addEventListener("click",exportJSON);
  el.querySelector("#remX").addEventListener("click",()=>{S.dismissReminder=true; renderReminder();});
}

// ---------- 書き出し / 読み込み ----------
async function exportJSON(){
  const entries=await Store.allEntries();
  const data={app:"hitokoma",version:2,exportedAt:new Date().toISOString(),
    settings:{theme:S.theme,reminderDays:S.reminderDays}, genres:S.genres, palette:S.palette, entries};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  const d=new Date();
  a.href=url; a.download=`hitokoma-${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.json`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  S.lastBackup=Date.now(); await Store.setMeta("lastBackup",S.lastBackup);
  S.dismissReminder=true; renderReminder(); toast("書き出しました");
}
function pickImport(){ document.getElementById("importFile").click(); }
async function doImport(file){
  let data; try{ data=JSON.parse(await file.text()); }catch(e){ toast("読み込めませんでした（JSON形式ではないようです）"); return; }
  if(!data||!Array.isArray(data.entries)){ toast("このファイルには記録が見つかりませんでした"); return; }
  const merge=await showConfirm("既存データをどうしますか？","追加して取り込む","全て置き換える");
  const mode=merge?"merge":"replace";
  if(mode==="replace") await Store.clearEntries();
  let existing=new Set((await Store.allEntries()).map(e=>e.id));
  let n=0;
  for(const e of data.entries){
    if(!e||typeof e.ts==="undefined") continue;
    // v2 は icons[] を持つ。旧形式（emo/lbl）が来たら icons[] に包んで取り込む。
    let icons;
    if(Array.isArray(e.icons)) icons=e.icons.map(ic=>({emo:ic.emo||"·",lbl:ic.lbl||"記録",genre:ic.genre??null}));
    else icons=[{emo:e.emo||"·",lbl:e.lbl||"記録",genre:null}];
    const rec={id:e.id||uid(),ts:Number(e.ts),icons,note:e.note||""};
    if(mode==="merge"&&existing.has(rec.id)) continue;
    await Store.putEntry(rec); n++;
  }
  if(Array.isArray(data.genres)&&data.genres.length){ S.genres=data.genres; await Store.setMeta("genres",S.genres); }
  if(Array.isArray(data.palette)&&data.palette.length){
    // palette item に id/genre を補完して取り込む。
    S.palette=data.palette.map(p=>({id:p.id||uid(),emo:p.emo||"⭐",lbl:p.lbl||"項目",genre:p.genre??((S.genres[0]&&S.genres[0].key)||"life")}));
    await Store.setMeta("palette",S.palette);
  }
  toast(`${n}件を取り込みました`);
  feedLimit=FEED_PAGE;
  renderPalette(); await refreshViews(); if(document.getElementById("setScrim").classList.contains("open")) renderPalEdit();
}

// ---------- 永続化 ----------
async function refreshPersist(){
  const el=document.getElementById("persistState");
  if(!navigator.storage||!navigator.storage.persisted){ el.textContent="この端末では永続化の状態を取得できません。"; return; }
  const p=await navigator.storage.persisted();
  el.textContent=p?"✓ 永続化済み：ブラウザに自動削除されにくい状態です。":"未永続化：ストレージ逼迫時に消える可能性があります。下のボタンで依頼できます。";
}
async function requestPersist(){
  if(!navigator.storage||!navigator.storage.persist){ toast("この端末は永続化に対応していません"); return; }
  const ok=await navigator.storage.persist();
  toast(ok?"永続化を有効にしました":"許可されませんでした"); refreshPersist();
}

// ---------- モーダル制御 ----------
function openScrim(id){document.getElementById(id).classList.add("open");}
function closeScrim(id){document.getElementById(id).classList.remove("open");}
document.querySelectorAll(".scrim").forEach(s=>s.addEventListener("click",e=>{if(e.target===s) s.classList.remove("open");}));

// アプリ内確認ダイアログ（confirm()の代替）
// okLabel/cancelLabel を省略すると「削除」「キャンセル」
function showConfirm(msg, okLabel="削除", cancelLabel="キャンセル"){
  return new Promise(resolve=>{
    document.getElementById("confirmMsg").textContent=msg;
    const ok=document.getElementById("confirmOk");
    const cancel=document.getElementById("confirmCancel");
    ok.textContent=okLabel;
    cancel.textContent=cancelLabel;
    openScrim("confirmScrim");
    const done=(result)=>{
      closeScrim("confirmScrim");
      ok.removeEventListener("click",onOk);
      cancel.removeEventListener("click",onCancel);
      resolve(result);
    };
    const onOk=()=>done(true);
    const onCancel=()=>done(false);
    ok.addEventListener("click",onOk);
    cancel.addEventListener("click",onCancel);
  });
}

// ---------- 設定シートを開く ----------
function openSettings(){
  document.querySelectorAll("#themeSeg button").forEach(b=>b.classList.toggle("on",b.dataset.t===S.theme));
  document.getElementById("reminderDays").value=String(S.reminderDays);

// ---------- イベント結線 ----------
function wire(){
  document.getElementById("commitBtn").onclick=commitEntry;

  // フィード：もっと見る（+10）／その日ビュー：ホームへ戻る
  document.getElementById("moreBtn").onclick=async()=>{ feedLimit+=FEED_PAGE; await renderFeed(); };
  document.getElementById("dayBack").onclick=()=>showFeed();

  // ホームタブ / カレンダータブ
  document.getElementById("tabToday").onclick=()=>{ showFeed(); window.scrollTo({top:0,behavior:"smooth"}); };
  document.getElementById("tabCal").onclick=()=>{ showCal(); window.scrollTo({top:0,behavior:"smooth"}); };
  document.getElementById("calPrev").onclick=()=>{ S.calDate=new Date(S.calDate.getFullYear(),S.calDate.getMonth()-1,1); renderCal(); };
  document.getElementById("calNext").onclick=()=>{ S.calDate=new Date(S.calDate.getFullYear(),S.calDate.getMonth()+1,1); renderCal(); };

  document.getElementById("tabFilter").onclick=openFilter;
  document.getElementById("filterClear").onclick=clearFilter;
  document.getElementById("filterApply").onclick=applyFilter;
  document.getElementById("tabSettings").onclick=openSettings;
  document.getElementById("setClose").onclick=()=>closeScrim("setScrim");

  document.getElementById("editSave").onclick=saveEdit;
  document.getElementById("editClose").onclick=()=>closeScrim("editScrim");
  document.getElementById("editDelete").onclick=deleteEdit;

  document.getElementById("addPal").onclick=()=>{
    const g=(S.genres[0]&&S.genres[0].key)||"life";
    S.palette.push({id:uid(),emo:"⭐",lbl:"新しい項目",genre:g}); savePalette();
  };
  document.getElementById("exportBtn").onclick=exportJSON;
  document.getElementById("importBtn").onclick=pickImport;
  document.getElementById("importFile").onchange=e=>{const f=e.target.files[0]; if(f) doImport(f); e.target.value="";};
  document.getElementById("persistBtn").onclick=requestPersist;

  document.getElementById("reminderDays").onchange=async e=>{S.reminderDays=Number(e.target.value); await Store.setMeta("reminderDays",S.reminderDays); renderReminder();};
  document.querySelectorAll("#themeSeg button").forEach(b=>b.onclick=async()=>{
    S.theme=b.dataset.t; await Store.setMeta("theme",S.theme); applyTheme();
    document.querySelectorAll("#themeSeg button").forEach(x=>x.classList.toggle("on",x===b));
  });
}
// ---------- 絞り込み ----------
function openFilter(){
  const body=document.getElementById("filterBody");
  body.innerHTML="";

  // ジャンル選択行
  const genreLabel=document.createElement("div"); genreLabel.className="filter-sec"; genreLabel.textContent="ジャンル";
  body.appendChild(genreLabel);
  const genreRow=document.createElement("div"); genreRow.className="filter-genre-row";
  S.genres.forEach(g=>{
    const b=document.createElement("button");
    b.className="filter-genre"+(filter.genres.has(g.key)?" sel":"");
    b.textContent=g.label;
    b.addEventListener("click",()=>{
      filter.genres.has(g.key)?filter.genres.delete(g.key):filter.genres.add(g.key);
      b.classList.toggle("sel",filter.genres.has(g.key));
    });
    genreRow.appendChild(b);
  });
  body.appendChild(genreRow);

  // 個別アイコン選択（ジャンルごとにセクション）
  const iconLabel=document.createElement("div"); iconLabel.className="filter-sec"; iconLabel.textContent="個別アイコン";
  body.appendChild(iconLabel);
  S.genres.forEach(g=>{
    const items=S.palette.filter(p=>p.genre===g.key);
    if(!items.length) return;
    const secLabel=document.createElement("div");
    secLabel.style.cssText="font-size:11.5px;color:var(--muted);margin:8px 0 4px;";
    secLabel.textContent=g.label;
    body.appendChild(secLabel);
    const grid=document.createElement("div"); grid.className="filter-icon-grid";
    items.forEach(it=>{
      const b=document.createElement("button");
      b.className="filter-icon"+(filter.icons.has(it.emo)?" sel":"");
      b.innerHTML=`<span class="emo">${it.emo}</span><span class="lbl">${escapeHtml(it.lbl)}</span>`;
      b.addEventListener("click",()=>{
        filter.icons.has(it.emo)?filter.icons.delete(it.emo):filter.icons.add(it.emo);
        b.classList.toggle("sel",filter.icons.has(it.emo));
      });
      grid.appendChild(b);
    });
    body.appendChild(grid);
  });

  openScrim("filterScrim");
}

async function applyFilter(){
  closeScrim("filterScrim");
  feedLimit=FEED_PAGE;
  updateFilterBadge();
  await refreshViews();
}

function clearFilter(){
  filter.genres.clear(); filter.icons.clear();
  // シート内の sel を外す
  document.querySelectorAll("#filterBody .sel").forEach(b=>b.classList.remove("sel"));
}

// フィード/カレンダー見出しの絞り込みバッジを更新
function updateFilterBadge(){
  const tabBadge=document.getElementById("filterBadge");
  if(tabBadge) tabBadge.hidden=!filterActive();
  ["feedView","calView"].forEach(id=>{
    const head=document.querySelector(`#${id} .thread-head, #${id} .cal-header`);
    if(!head) return;
    const old=head.querySelector(".filter-badge");
    if(old) old.remove();
    if(!filterActive()) return;
    const badge=document.createElement("span"); badge.className="filter-badge";
    badge.textContent="絞り込み中 ✕";
    badge.addEventListener("click",async()=>{ filter.genres.clear(); filter.icons.clear(); updateFilterBadge(); feedLimit=FEED_PAGE; await refreshViews(); });
    head.appendChild(badge);
  });
}

// カレンダーを描画（S.calDate の月を表示）
async function renderCal(){
  const y=S.calDate.getFullYear(), m=S.calDate.getMonth();
  document.getElementById("calMonth").textContent=`${y}年${m+1}月`;

  // その月の全エントリを取得（月初〜月末）
  const monthStart=new Date(y,m,1).getTime();
  const monthEnd=new Date(y,m+1,1).getTime();
  const entries=await Store.entriesInRange(monthStart,monthEnd);

  // 日ごとに記録を集約。絞り込み時は該当記録のみ残す（非該当日は dayMap に入らない）
  const dayMap=new Map();    // dayKey(ms) -> entry[]（表示用・絞り込み済み）
  const dayMapAll=new Map(); // dayKey(ms) -> entry[]（全件。非該当日の淡色判定用）
  entries.forEach(e=>{
    const k=dayStart(e.ts);
    if(!dayMapAll.has(k)) dayMapAll.set(k,[]);
    dayMapAll.get(k).push(e);
    if(entryMatches(e)){
      if(!dayMap.has(k)) dayMap.set(k,[]);
      dayMap.get(k).push(e);
    }
  });

  // グリッドを構築
  const grid=document.getElementById("calGrid");
  grid.innerHTML="";
  const ws=S.weekStart; // 0=日曜, 1=月曜
  const DOW_LABELS=["日","月","火","水","木","金","土"];
  // weekStart に従って曜日ヘッダを並べる
  for(let i=0;i<7;i++){
    const di=(i+ws)%7;
    const el=document.createElement("div");
    el.className="cal-dow"+(di===0?" sun":di===6?" sat":"");
    el.textContent=DOW_LABELS[di];
    grid.appendChild(el);
  }

  // 月初の曜日オフセット
  const firstDow=new Date(y,m,1).getDay(); // 0=日
  const offset=(firstDow-ws+7)%7;
  const daysInMonth=new Date(y,m+1,0).getDate();
  const today=new Date();

  // 前月の埋め（空セル or 前月日付）
  const prevMonthDays=new Date(y,m,0).getDate();
  for(let i=0;i<offset;i++){
    const day=prevMonthDays-offset+1+i;
    const cell=makeCalCell(new Date(y,m-1,day),true,dayMap);
    grid.appendChild(cell);
  }
  // 当月
  for(let d=1;d<=daysInMonth;d++){
    const date=new Date(y,m,d);
    const cell=makeCalCell(date,false,dayMap);
    if(isSameDay(date,today)) cell.classList.add("today");
    // 絞り込み中：記録はあるが該当なしの日を淡色化
    if(filterActive()){
      const k=dayStart(date.getTime());
      if(dayMapAll.has(k)&&!dayMap.has(k)) cell.classList.add("filtered-out");
    }
    grid.appendChild(cell);
  }
  // 翌月の埋め（6行に揃える）
  const total=offset+daysInMonth;
  const rows=Math.ceil(total/7);
  const remain=rows*7-total;
  for(let d=1;d<=remain;d++){
    const cell=makeCalCell(new Date(y,m+1,d),true,dayMap);
    grid.appendChild(cell);
  }
}

function makeCalCell(date,otherMonth,dayMap){
  const cell=document.createElement("div");
  cell.className="cal-cell"+(otherMonth?" other-month":"");
  const inner=document.createElement("div"); inner.className="cal-inner";

  const dow=date.getDay();
  const dayEl=document.createElement("div");
  dayEl.className="cal-day"+(dow===0?" sun":dow===6?" sat":"");
  dayEl.textContent=date.getDate();
  inner.appendChild(dayEl);

  // その日の記録アイコン（最後の記録、最大3個）
  const k=dayStart(date.getTime());
  if(dayMap.has(k)){
    const list=dayMap.get(k).sort((a,b)=>b.ts-a.ts);
    const icons=(list[0].icons||[]).slice(0,3);
    if(icons.length){
      const icRow=document.createElement("div"); icRow.className="cal-icons";
      icons.forEach(ic=>{
        const s=document.createElement("span"); s.className="cal-ic"; s.textContent=ic.emo;
        icRow.appendChild(s);
      });
      inner.appendChild(icRow);
    }
  }

  cell.appendChild(inner);
  cell.addEventListener("click",()=>showDay(date));
  return cell;
}

// ---------- マイグレーション（meta.schema で冪等化） ----------
// 既存ユーザーは存在しないため、過去形式（v1）からの変換ロジックは持たない。
// 将来データ形式を破壊的に変えたときに、ここへ「from→to」の段階的変換を足す。
async function migrate(){
  let schema=await Store.getMeta("schema",null);
  if(schema===null){
    // 初回起動（または schema 未設定）。現行形式 = SCHEMA として確定するだけ。
    await Store.setMeta("schema",SCHEMA);
    return;
  }
  // 例：今後 SCHEMA を 3 に上げたら、ここで if(schema<3){ ...変換...; schema=3 } を積む。
  if(schema!==SCHEMA){
    // 既知の変換を全て適用し終えたら版を確定。
    await Store.setMeta("schema",SCHEMA);
  }
}

// ---------- 起動 ----------
async function boot(){
  await Store.init();
  await migrate();
  S.genres=await Store.getMeta("genres",null);
  if(!S.genres){ S.genres=DEFAULT_GENRES.slice(); await Store.setMeta("genres",S.genres); }
  S.palette=await Store.getMeta("palette",null);
  if(!S.palette){ S.palette=DEFAULT_PALETTE.slice(); await Store.setMeta("palette",S.palette); }
  S.theme=await Store.getMeta("theme","auto");
  S.reminderDays=await Store.getMeta("reminderDays",7);
  S.lastBackup=await Store.getMeta("lastBackup",null);
  S.weekStart=await Store.getMeta("weekStart",0);
  applyTheme(); wire();
  renderPalette(); updateCommitBtn(); resetDetails();
  showFeed(); await renderFeed(); renderReminder();
  // 初回は静かに永続化を依頼
  if(navigator.storage&&navigator.storage.persist){ try{ await navigator.storage.persist(); }catch(_){} }
  if("serviceWorker" in navigator){ try{ await navigator.serviceWorker.register("sw.js"); }catch(_){} }
}
boot().catch(err=>{
  document.getElementById("feedSlot").innerHTML=
    `<div class="empty">起動できませんでした。<br>このブラウザはプライベートモードか、保存機能が制限されているかもしれません。</div>`;
  console.error(err);
});
</script>
